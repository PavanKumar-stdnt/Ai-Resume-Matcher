# render.yaml — Render.com infrastructure-as-code deployment config
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: connect your GitHub repo to Render, it reads this file automatically.

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: resume-matcher-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter          # Change to: standard, pro for more CPU/RAM
    region: oregon          # us-west-2 equivalent
    branch: main
    healthCheckPath: /api/v1/health

    # Auto-deploy on every push to main
    autoDeploy: true

    # Environment variables — set secret values in Render dashboard
    envVars:
      - key: GOOGLE_API_KEY
        sync: false           # Set manually in Render dashboard
      - key: API_SECRET_KEY
        sync: false           # Set manually in Render dashboard
      - key: QDRANT_URL
        sync: false           # Your Qdrant Cloud cluster URL
      - key: QDRANT_API_KEY
        sync: false           # Your Qdrant Cloud API key
      - key: QDRANT_COLLECTION_NAME
        value: resumes
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      #- key: EMBEDDING_DIMENSION
        value: "384"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ENVIRONMENT
        value: production
      - key: MLFLOW_ENABLED
        value: "false"        # Set to true if running MLflow separately
      - key: MLFLOW_TRACKING_URI
        value: ./mlruns       # Local fallback; change to mlflow server URL
      - key: MLFLOW_EXPERIMENT_NAME
        value: ai-resume-matcher
      - key: HISTORY_CSV_PATH
        value: /app/data/matching_history_database.csv
      - key: ALLOWED_ORIGINS
        value: "https://your-streamlit-app.streamlit.app"

    # Persistent disk for CSV history
    disk:
      name: resume-matcher-data
      mountPath: /app/data
      sizeGB: 1

  # ── MLflow Tracking Server (optional) ───────────────────────────────────────
  - type: web
    name: resume-matcher-mlflow
    runtime: docker
    dockerfilePath: ./Dockerfile.mlflow
    dockerContext: .
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    disk:
      name: mlflow-data
      mountPath: /mlruns
      sizeGB: 5
