# .streamlit/config.toml — Streamlit app configuration

[theme]
base = "dark"
primaryColor = "#00e5a0"
backgroundColor = "#080b10"
secondaryBackgroundColor = "#0e1219"
textColor = "#dde4f0"
font = "sans serif"

[server]
maxUploadSize = 100
enableCORS = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false
